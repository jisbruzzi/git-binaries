name: Build Static Git

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libcurl4-openssl-dev \
            libexpat-dev \
            gettext \
            zlib1g-dev \
            pkg-config

      - name: Download git source
        run: |
          curl -L https://mirrors.edge.kernel.org/pub/software/scm/git/git-2.44.0.tar.gz | tar xz

      - name: Build static git with HTTPS support
        run: |
          cd git-2.44.0
          make configure
          ./configure \
            LDFLAGS="-static -static-libgcc" \
            CFLAGS="-Os" \
            --without-tcltk \
            --without-python \
            --with-openssl \
            --with-curl
          make -j$(nproc) \
            CURL_LDFLAGS="$(curl-config --static-libs)" \
            NO_EXPAT=1 \
            REMOTE_CURL_PRIMARY=git-remote-https \
            REMOTE_CURL_ALIASES="git-remote-http git-remote-ftp git-remote-ftps"
          # git-remote-https is a symlink to git-remote-http in some builds, resolve it
          if [ -L git-remote-https ]; then
            cp --remove-destination $(readlink git-remote-https) git-remote-https
          fi
          strip git
          ls -la git-remote-* || echo "No git-remote-* binaries found"
          file git-remote-* 2>/dev/null || true
