name: Build Static Git

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libcurl4-openssl-dev \
            libexpat-dev \
            gettext \
            zlib1g-dev \
            pkg-config

      - name: Download git source
        run: |
          curl -L https://mirrors.edge.kernel.org/pub/software/scm/git/git-2.44.0.tar.gz | tar xz

      - name: Build static git with HTTPS support
        run: |
          cd git-2.44.0
          make configure
          ./configure \
            LDFLAGS="-static -static-libgcc" \
            CFLAGS="-Os" \
            --without-tcltk \
            --without-python \
            --with-openssl \
            --with-curl
          make -j$(nproc) \
            CURL_LDFLAGS="$(curl-config --static-libs)" \
            NO_EXPAT=1 \
            REMOTE_CURL_PRIMARY=git-remote-https \
            REMOTE_CURL_ALIASES="git-remote-http git-remote-ftp git-remote-ftps"
          # Resolve symlink if needed
          if [ -L git-remote-https ]; then
            cp --remove-destination $(readlink git-remote-https) git-remote-https
          fi
          strip git
          strip git-remote-https 2>/dev/null || (strip git-remote-http && cp git-remote-http git-remote-https)
          ls -la git git-remote-https

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-static-linux-amd64
          path: |
            git-2.44.0/git
            git-2.44.0/git-remote-https

      - name: Create tag
        id: tag
        run: |
          TAG="git-2.44.0-static-$(date +'%Y%m%d%H%M%S')"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Static Git ${{ steps.tag.outputs.tag }}
          body: "Statically linked git 2.44.0 for Linux x86_64. Includes git and git-remote-https for HTTPS remote support."
          files: |
            git-2.44.0/git
            git-2.44.0/git-remote-https
